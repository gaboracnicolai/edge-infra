name: Build and push images

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'Dockerfile.control-plane'
      - 'osb/**'
      - 'auth-service/src/**'
      - 'auth-service/Cargo.*'
      - '.github/workflows/images.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'Dockerfile.control-plane'
      - 'osb/**'
      - 'auth-service/src/**'
      - 'auth-service/Cargo.*'
      - '.github/workflows/images.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  control-plane:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.control-plane
          target: server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/edge-control-plane:${{ github.sha }}
            ${{ github.event_name != 'pull_request' && format('ghcr.io/{0}/edge-control-plane:latest', env.OWNER) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.control-plane
          target: issuer
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/edge-issuer:${{ github.sha }}
            ${{ github.event_name != 'pull_request' && format('ghcr.io/{0}/edge-issuer:latest', env.OWNER) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.control-plane
          target: ratelimit
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/edge-ratelimit:${{ github.sha }}
            ${{ github.event_name != 'pull_request' && format('ghcr.io/{0}/edge-ratelimit:latest', env.OWNER) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.control-plane
          target: secrets
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/edge-secrets:${{ github.sha }}
            ${{ github.event_name != 'pull_request' && format('ghcr.io/{0}/edge-secrets:latest', env.OWNER) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.control-plane
          target: migrate
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/edge-migrate:${{ github.sha }}
            ${{ github.event_name != 'pull_request' && format('ghcr.io/{0}/edge-migrate:latest', env.OWNER) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  osb:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: osb/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/edge-osb:${{ github.sha }}
            ${{ github.event_name != 'pull_request' && format('ghcr.io/{0}/edge-osb:latest', env.OWNER) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  auth-service:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install arm64 cross-compiler
        if: matrix.arch == 'arm64'
        run: |
          rustup target add aarch64-unknown-linux-gnu
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry + target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            auth-service/target
          key: cargo-${{ matrix.arch }}-${{ hashFiles('auth-service/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.arch }}-

      - name: Build amd64 (native)
        if: matrix.arch == 'amd64'
        working-directory: auth-service
        run: |
          cargo build --release
          mkdir -p dist
          cp target/release/auth-service dist/auth-service

      - name: Build arm64 (cross-compile)
        if: matrix.arch == 'arm64'
        working-directory: auth-service
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/release/auth-service dist/auth-service

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        if: matrix.arch == 'amd64'
        with:
          context: auth-service
          file: auth-service/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/${{ env.OWNER }}/auth-service:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=auth-service-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=auth-service-${{ matrix.arch }}

      # arm64: skip Docker's Rust build entirely. The binary was cross-compiled
      # on the amd64 host above; this step just packages it into distroless via
      # BUILD_MODE=ci, then pushes with the linux/arm64 platform manifest. No
      # RUN commands execute, so no QEMU emulation is triggered.
      - name: Build and push arm64 (cross-compiled, no emulation)
        if: matrix.arch == 'arm64'
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --build-arg BUILD_MODE=ci \
            -f auth-service/Dockerfile \
            -t ghcr.io/${{ env.OWNER }}/auth-service:${{ github.sha }}-arm64 \
            --push \
            auth-service/

  auth-service-merge:
    needs: auth-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ env.OWNER }}/auth-service:${{ github.sha }} \
            ${{ github.event_name != 'pull_request' && format('--tag ghcr.io/{0}/auth-service:latest', env.OWNER) || '' }} \
            ghcr.io/${{ env.OWNER }}/auth-service:${{ github.sha }}-amd64 \
            ghcr.io/${{ env.OWNER }}/auth-service:${{ github.sha }}-arm64
