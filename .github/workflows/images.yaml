name: Build and push images

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'Dockerfile.control-plane'
      - 'osb/**'
      - 'auth-service/src/**'
      - 'auth-service/Cargo.*'
      - '.github/workflows/images.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'Dockerfile.control-plane'
      - 'osb/**'
      - 'auth-service/src/**'
      - 'auth-service/Cargo.*'
      - '.github/workflows/images.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  control-plane:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.control-plane
          target: server
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/edge-control-plane:latest
            ghcr.io/${{ env.OWNER }}/edge-control-plane:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.control-plane
          target: controller
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/edge-controller:latest
            ghcr.io/${{ env.OWNER }}/edge-controller:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  osb:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: osb/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER }}/edge-osb:latest
            ghcr.io/${{ env.OWNER }}/edge-osb:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  auth-service:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install arm64 cross-compiler
        if: matrix.arch == 'arm64'
        run: |
          rustup target add aarch64-unknown-linux-gnu
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            auth-service/target
          key: cargo-${{ matrix.arch }}-${{ hashFiles('auth-service/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.arch }}-

      - name: Build amd64 (native)
        if: matrix.arch == 'amd64'
        working-directory: auth-service
        run: |
          cargo build --release
          mkdir -p dist
          cp target/release/auth-service dist/auth-service

      - name: Build arm64 (cross-compile)
        if: matrix.arch == 'arm64'
        working-directory: auth-service
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/release/auth-service dist/auth-service

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # amd64: untouched — native Rust build inside Docker runs at full speed.
      - uses: docker/build-push-action@v6
        if: matrix.arch == 'amd64'
        with:
          context: auth-service
          file: auth-service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: ${{ matrix.platform }}
          tags: |
            ghcr.io/${{ env.OWNER }}/auth-service:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=auth-service-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=auth-service-${{ matrix.arch }}

      # arm64: skip Docker's Rust build entirely. The binary was cross-compiled
      # on the amd64 host above; this step just packages it into distroless via
      # BUILD_MODE=ci, then pushes with the linux/arm64 platform manifest. No
      # RUN commands execute, so no QEMU emulation is triggered.
      - name: Build and push arm64 (cross-compiled, no emulation)
        if: matrix.arch == 'arm64' && github.event_name != 'pull_request'
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --build-arg BUILD_MODE=ci \
            -f auth-service/Dockerfile \
            -t ghcr.io/${{ env.OWNER }}/auth-service:${{ github.sha }}-arm64 \
            --push \
            auth-service/

      - name: Build arm64 (cross-compiled, PR check only)
        if: matrix.arch == 'arm64' && github.event_name == 'pull_request'
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --build-arg BUILD_MODE=ci \
            -f auth-service/Dockerfile \
            auth-service/

  auth-service-merge:
    needs: auth-service
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ env.OWNER }}/auth-service:latest \
            --tag ghcr.io/${{ env.OWNER }}/auth-service:${{ github.sha }} \
            ghcr.io/${{ env.OWNER }}/auth-service:${{ github.sha }}-amd64 \
            ghcr.io/${{ env.OWNER }}/auth-service:${{ github.sha }}-arm64
