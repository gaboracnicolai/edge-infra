name: OSB Test

# Runs the OSB broker's Python suite. Before this, no workflow ran osb/** tests
# — only images.yaml built the image, so the R4 translator's unit correctness
# re-ran on no push. Two jobs:
#   pytest       — fast, DB-free gate (mock suite); the always-green gate.
#   integration  — the DB-backed integration E2E suite against a real Postgres:
#                  the cross-language OSB -> data-plane E2E (Python translator
#                  writes; Go LoadSnapshot serves) AND the edge-secrets custodian
#                  E2E (operator mTLS write -> secrets row -> per-SNI render).
#
# GitHub path filters are workflow-level, so both jobs share the union of paths;
# the fast pytest gate harmlessly also runs on internal/store|secrets/** changes
# (the mock suite is DB-free and unaffected).
on:
  push:
    paths:
      - 'osb/**'
      - 'internal/store/**'
      - 'internal/secrets/**'
      - 'cmd/secrets/**'
      - 'cmd/server/**'
      - '.github/workflows/osb-test.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'osb/**'
      - 'internal/store/**'
      - 'internal/secrets/**'
      - 'cmd/secrets/**'
      - 'cmd/server/**'
      - '.github/workflows/osb-test.yaml'

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip
      - name: Install OSB + dev deps
        run: pip install -e './osb[dev]'
      - name: pytest (mock-only; integration tests skip without TEST_DATABASE_URL)
        run: pytest -q
        working-directory: osb

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: osb
          POSTGRES_PASSWORD: osb
          POSTGRES_DB: edge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U osb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://osb:osb@localhost:5432/edge?sslmode=disable
      # Absolute path: the Go E2E runs `go test ./internal/store/`, whose test
      # binary executes with cwd=the package dir, so a relative provision.py path
      # would resolve under internal/store/. github.workspace is the repo root.
      OSB_PROVISION: python ${{ github.workspace }}/osb/tools/provision.py
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.24'
          cache: true
      - name: Install OSB + dev deps
        run: pip install -e './osb[dev]'
      - name: Apply both schemas to the one shared database
        run: |
          python - <<'PY'
          import asyncio, os, asyncpg
          FILES = [
              "migrations/0001_init.sql",
              "migrations/0002_controller_fields.sql",
              "migrations/0003_service_policy.sql",
              "migrations/0004_auth_policy.sql",
              "migrations/0005_route_tls_secret.sql",
              "migrations/0006_secret_kind.sql",
              "migrations/0007_route_client_ca.sql",
              "osb/migrations/0001_osb.sql",
              "osb/migrations/0002_tenancy.sql",
              "osb/migrations/0003_dead_letter.sql",
          ]
          async def main():
              conn = await asyncpg.connect(os.environ["TEST_DATABASE_URL"])
              try:
                  for f in FILES:
                      with open(f) as fh:
                          await conn.execute(fh.read())
              finally:
                  await conn.close()
          asyncio.run(main())
          PY
      - name: Python translator + tenancy suites (shared DB)
        run: pytest tests/test_translator.py tests/test_tenancy.py -q
        working-directory: osb
      - name: Go cross-language E2E (-count=1, no cached pass)
        run: go test -count=1 -tags integration ./internal/store/ -run TestLoadSnapshot_OSB
      - name: Go edge-secrets custodian E2E (-count=1, no cached pass)
        run: go test -count=1 -tags integration ./internal/secrets/ -run TestE2E
      # Admin READ API: key-free store readers + the five-endpoint leak-guard
      # E2E (no response may carry key material; readers need no KEK).
      - name: Go admin read-API store readers (-count=1, no cached pass)
        run: go test -count=1 -tags integration ./internal/store/ -run TestAdminRead
      - name: Go admin read-API E2E leak guard (-count=1, no cached pass)
        run: go test -count=1 -tags integration ./cmd/server/ -run TestAdminAPI
