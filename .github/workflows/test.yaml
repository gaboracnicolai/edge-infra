name: Test

# Runs the unit + integration test suites. The existing images.yaml only
# *builds* the binaries, so before this workflow nothing actually executed
# the auth-service integration tests or the control-plane Go tests on a PR.
on:
  push:
    paths:
      - 'auth-service/**'
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/test.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'auth-service/**'
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/test.yaml'

jobs:
  auth-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            auth-service/target
          key: cargo-test-${{ hashFiles('auth-service/Cargo.lock') }}
          restore-keys: |
            cargo-test-
      - name: cargo test
        working-directory: auth-service
        run: cargo test --locked

  control-plane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.24'
          cache: true
      - name: go test
        run: go test ./... -count=1
      # R1 live xDS mutual-TLS handshake validation. No DB/Docker — pure Go +
      # in-memory certs — so it runs here rather than in the integration harness.
      - name: xDS mTLS handshake (integration-tagged)
        run: go test -tags integration -v ./cmd/server/ -run TestXDS -count=1
