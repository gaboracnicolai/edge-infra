# This ConfigMap is what Prometheus actually mounts and loads (see deployment.yaml
# volumes `config`/`alerts`). Its rule/recording keys DUPLICATE the source-of-truth
# files under observability/prometheus/ (alerts/*.yaml, recording-rules.yaml). There
# is no generator wiring that dir into this ConfigMap, so the two WILL drift unless
# edited together — when you change a rule here, change it there too, and vice versa.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yaml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 30s
      external_labels:
        cluster: "${CLUSTER_NAME}"
        environment: "${ENVIRONMENT}"

    rule_files:
      - /etc/prometheus/alerts/*.yaml
      - /etc/prometheus/recording-rules.yaml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: otel-collector
        static_configs:
          - targets: ["otel-collector.monitoring.svc.cluster.local:8888"]

  recording-rules.yaml: |
    groups:
      - name: edge-recording-rules
        interval: 30s
        rules:
          - record: edge:upstream_error_ratio:rate5m
            expr: |
              sum by (envoy_cluster_name) (
                rate(envoy_cluster_upstream_rq_xx{envoy_response_code_class="5"}[5m])
              )
              /
              sum by (envoy_cluster_name) (
                rate(envoy_cluster_upstream_rq_total[5m])
              )

          - record: edge:upstream_rps:rate5m
            expr: |
              sum by (envoy_cluster_name) (
                rate(envoy_cluster_upstream_rq_total[5m])
              )

          - record: edge:auth_denial_ratio:rate5m
            expr: |
              sum(rate(auth_requests_total{result="denied"}[5m]))
              /
              sum(rate(auth_requests_total[5m]))

          - record: edge:osb_nak_ratio:rate5m
            expr: |
              sum(rate(osb_nats_messages_total{result="nak"}[5m]))
              /
              sum(rate(osb_nats_messages_total[5m]))
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alerts
  namespace: monitoring
data:
  edge-proxy.yaml: |
    groups:
      - name: edge-proxy
        interval: 30s
        rules:
          - alert: EnvoyXDSDisconnected
            expr: envoy_control_plane_connected_state == 0
            for: 2m
            labels:
              severity: critical
              team: edge
            annotations:
              summary: "Envoy lost xDS connection"
              runbook: https://runbooks.internal/edge/xds-disconnect

          - alert: EnvoyHighErrorRate
            expr: |
              (
                sum by (envoy_cluster_name) (
                  rate(envoy_cluster_upstream_rq_xx{envoy_response_code_class="5"}[5m])
                )
                /
                sum by (envoy_cluster_name) (
                  rate(envoy_cluster_upstream_rq_total[5m])
                )
              ) > 0.01
            for: 5m
            labels:
              severity: warning
              team: edge
            annotations:
              summary: "High 5xx rate"

          - alert: EnvoyHighP99Latency
            expr: |
              histogram_quantile(0.99,
                sum by (le, envoy_cluster_name) (
                  rate(envoy_cluster_upstream_rq_time_bucket[5m])
                )
              ) > 2000
            for: 10m
            labels:
              severity: warning
              team: edge
            annotations:
              summary: "P99 latency > 2s"

          - alert: EnvoyProxyFleetShrinking
            expr: |
              count(envoy_control_plane_connected_state == 1)
              < (count(envoy_control_plane_connected_state) * 0.9)
            for: 5m
            labels:
              severity: warning
              team: edge
            annotations:
              summary: "More than 10% of Envoy proxies disconnected"

          - alert: EnvoyCircuitBreakerOpen
            expr: |
              sum by (envoy_cluster_name) (
                envoy_cluster_circuit_breakers_default_cx_open
              ) > 0
            for: 1m
            labels:
              severity: warning
              team: edge
            annotations:
              summary: "Circuit breaker open"

  control-plane.yaml: |
    groups:
      - name: edge-control-plane
        interval: 30s
        rules:
          # REMOVED (edge-observability-truth): ControlPlaneReconcileStalled,
          # ControlPlaneHighReconcileDuration, ControlPlaneSnapshotVersionLag,
          # ControlPlaneDBConnectionsExhausted referenced edge_cp_* metrics that NO
          # service emits (control-plane /metrics = internal/xds/metrics.go exposes
          # ONLY xds_snapshots_blocked_total) and could never fire. See FOLLOW-UP in
          # observability/prometheus/alerts/control-plane.yaml (source-of-truth copy;
          # keep this key in sync with it).
          - alert: ControlPlaneSnapshotWithheld
            expr: increase(xds_snapshots_blocked_total[10m]) > 0
            for: 0m
            labels:
              severity: critical
              team: edge
            annotations:
              summary: "Control plane withheld an xDS snapshot (reason: {{ $labels.reason }})"
              description: >
                The xDS reconciler blocked {{ $value | humanize }} snapshot(s) in the
                last 10m for reason "{{ $labels.reason }}" and is serving last-good
                config to the Envoy fleet. New or changed routes are NOT reaching the
                proxies until the underlying config problem is resolved.
              runbook: https://runbooks.internal/edge/snapshot-withheld

  osb.yaml: |
    groups:
      - name: edge-osb
        interval: 30s
        rules:
          - alert: OSBHighProvisionFailureRate
            expr: |
              (
                sum(rate(osb_nats_messages_total{result="nak"}[5m]))
                /
                sum(rate(osb_nats_messages_total[5m]))
              ) > 0.05
            for: 5m
            labels:
              severity: warning
              team: edge
            annotations:
              summary: "OSB worker NAK rate > 5%"

          - alert: OSBWebhookDeliveryDegraded
            expr: |
              (
                sum(rate(osb_webhook_deliveries_total{result="failure"}[15m]))
                /
                sum(rate(osb_webhook_deliveries_total[15m]))
              ) > 0.1
            for: 10m
            labels:
              severity: warning
              team: edge
            annotations:
              summary: "OSB webhook delivery failure rate > 10%"

          # REMOVED (edge-observability-truth): OSBNATSConsumerLagHigh referenced
          # nats_consumer_num_pending — nothing scrapes NATS (no exporter, no collector
          # job), so it could never fire. FOLLOW-UP in the source-of-truth copy
          # observability/prometheus/alerts/osb.yaml; keep this key in sync.

  auth-service.yaml: |
    groups:
      - name: auth-service
        interval: 30s
        rules:
          - alert: AuthServiceHighDenialRate
            expr: |
              (
                sum(rate(auth_requests_total{result="denied"}[5m]))
                /
                sum(rate(auth_requests_total[5m]))
              ) > 0.1
            for: 5m
            labels:
              severity: warning
              team: edge
            annotations:
              summary: "Auth denial rate > 10%"

          - alert: AuthServiceJWKSRefreshFailing
            expr: sum(rate(jwks_refresh_total{result="failure"}[15m])) > 0
            for: 15m
            labels:
              severity: critical
              team: edge
            annotations:
              summary: "JWKS refresh failing for 15m"
              runbook: https://runbooks.internal/edge/jwks-failure

          - alert: AuthServiceHighValidationLatency
            expr: |
              histogram_quantile(0.99,
                rate(jwt_validation_duration_seconds_bucket[5m])
              ) > 0.01
            for: 10m
            labels:
              severity: warning
              team: edge
            annotations:
              summary: "JWT validation P99 > 10ms"
