# NOTE: source-of-truth copy. The SAME rules are inlined in
# observability/k8s/prometheus/configmap.yaml (ConfigMap `prometheus-config`,
# key `recording-rules.yaml`) — that inlined copy is the one Prometheus mounts.
# Keep both in sync.
#
# Envoy labels are `envoy_cluster_name` / `envoy_response_code_class` (verified
# live). Recording rules therefore emit series keyed by `envoy_cluster_name`;
# dashboards that legend on these must use {{envoy_cluster_name}}.
groups:
  - name: edge-recording-rules
    interval: 30s
    rules:
      - record: edge:upstream_error_ratio:rate5m
        expr: |
          sum by (envoy_cluster_name) (
            rate(envoy_cluster_upstream_rq_xx{envoy_response_code_class="5"}[5m])
          )
          /
          sum by (envoy_cluster_name) (
            rate(envoy_cluster_upstream_rq_total[5m])
          )

      - record: edge:upstream_rps:rate5m
        expr: |
          sum by (envoy_cluster_name) (
            rate(envoy_cluster_upstream_rq_total[5m])
          )

      - record: edge:auth_denial_ratio:rate5m
        expr: |
          sum(rate(auth_requests_total{result="denied"}[5m]))
          /
          sum(rate(auth_requests_total[5m]))

      - record: edge:osb_nak_ratio:rate5m
        expr: |
          sum(rate(osb_nats_messages_total{result="nak"}[5m]))
          /
          sum(rate(osb_nats_messages_total[5m]))
