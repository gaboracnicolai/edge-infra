# NOTE: this file is the source-of-truth copy. The SAME rules are inlined in
# observability/k8s/prometheus/configmap.yaml (ConfigMap `prometheus-alerts`,
# key `edge-proxy.yaml`) — that inlined copy is the one Prometheus actually
# mounts (see observability/k8s/prometheus/deployment.yaml, volume `alerts`).
# Keep the rule logic in both copies in sync. (A generator would need the
# out-of-scope Makefile/deploy path; until then, edit both.)
#
# Envoy's Prometheus exposition labels the response class and cluster as
# `envoy_response_code_class` and `envoy_cluster_name` (verified live against
# edge-proxy :9903 /stats/prometheus). Bare `response_code_class` / `cluster_name`
# match nothing.
groups:
  - name: edge-proxy
    interval: 30s
    rules:
      - alert: EnvoyXDSDisconnected
        expr: envoy_control_plane_connected_state == 0
        for: 2m
        labels:
          severity: critical
          team: edge
        annotations:
          summary: "Envoy {{ $labels.instance }} lost xDS connection"
          description: >
            Proxy {{ $labels.instance }} has been disconnected from the
            xDS control plane for more than 2 minutes. It is serving
            stale config. Check control plane pod health.
          runbook: https://runbooks.internal/edge/xds-disconnect

      - alert: EnvoyHighErrorRate
        expr: |
          (
            sum by (envoy_cluster_name) (
              rate(envoy_cluster_upstream_rq_xx{envoy_response_code_class="5"}[5m])
            )
            /
            sum by (envoy_cluster_name) (
              rate(envoy_cluster_upstream_rq_total[5m])
            )
          ) > 0.01
        for: 5m
        labels:
          severity: warning
          team: edge
        annotations:
          summary: "High 5xx rate on cluster {{ $labels.envoy_cluster_name }}"
          description: >
            Cluster {{ $labels.envoy_cluster_name }} is returning 5xx errors
            at {{ $value | humanizePercentage }} over the last 5m.

      - alert: EnvoyHighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum by (le, envoy_cluster_name) (
              rate(envoy_cluster_upstream_rq_time_bucket[5m])
            )
          ) > 2000
        for: 10m
        labels:
          severity: warning
          team: edge
        annotations:
          summary: "P99 latency > 2s on {{ $labels.envoy_cluster_name }}"
          description: >
            P99 upstream latency for {{ $labels.envoy_cluster_name }} is
            {{ $value | humanizeDuration }}ms over the last 10 minutes.

      - alert: EnvoyProxyFleetShrinking
        expr: |
          count(envoy_control_plane_connected_state == 1)
          < (count(envoy_control_plane_connected_state) * 0.9)
        for: 5m
        labels:
          severity: warning
          team: edge
        annotations:
          summary: "More than 10% of Envoy proxies disconnected"
          description: >
            {{ $value }} proxies are connected out of the fleet total.
            A fleet-wide issue may be occurring; cross-check the
            connected proxy count against expected capacity.

      - alert: EnvoyCircuitBreakerOpen
        expr: |
          sum by (envoy_cluster_name) (
            envoy_cluster_circuit_breakers_default_cx_open
          ) > 0
        for: 1m
        labels:
          severity: warning
          team: edge
        annotations:
          summary: "Circuit breaker open on {{ $labels.envoy_cluster_name }}"
