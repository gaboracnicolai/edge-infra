groups:
  - name: edge-control-plane
    interval: 30s
    rules:
      - alert: ControlPlaneReconcileStalled
        expr: |
          time() - edge_cp_last_reconcile_timestamp_seconds > 60
        for: 1m
        labels:
          severity: critical
          team: edge
        annotations:
          summary: "xDS reconciler has not run in > 60s"
          description: >
            The reconcile loop last completed
            {{ $value | humanizeDuration }} ago. Config changes are
            not being pushed to the Envoy fleet.
          runbook: https://runbooks.internal/edge/reconcile-stall

      - alert: ControlPlaneHighReconcileDuration
        expr: |
          histogram_quantile(0.99,
            rate(edge_cp_reconcile_duration_seconds_bucket[5m])
          ) > 2
        for: 10m
        labels:
          severity: warning
          team: edge
        annotations:
          summary: "Reconcile loop P99 > 2s"

      - alert: ControlPlaneSnapshotVersionLag
        expr: |
          max(edge_cp_snapshot_version) - min(edge_cp_snapshot_version) > 3
        for: 5m
        labels:
          severity: warning
          team: edge
        annotations:
          summary: "Snapshot version spread across fleet > 3"
          description: >
            Some proxies are significantly behind the latest config
            version. Check for disconnected or slow proxy nodes.

      - alert: ControlPlaneDBConnectionsExhausted
        expr: |
          edge_cp_db_pool_idle == 0 and edge_cp_db_pool_waiting > 0
        for: 2m
        labels:
          severity: critical
          team: edge
        annotations:
          summary: "DB connection pool exhausted in control plane"
