# NOTE: source-of-truth copy; the SAME rules are inlined in
# observability/k8s/prometheus/configmap.yaml (ConfigMap `prometheus-alerts`,
# key `osb.yaml`) — the copy Prometheus actually mounts. Keep in sync.
#
# REMOVED (edge-observability-truth): OSBNATSConsumerLagHigh referenced
# nats_consumer_num_pending, which NOTHING emits — the NATS server (svc nats:8222)
# is not scraped and no prometheus-nats-exporter is deployed; the collector has no
# NATS job and osb/metrics.py exposes no queue-depth gauge. The rule could never fire.
# FOLLOW-UP (worth doing): worker consumer lag is a real incident signal — add
# either a prometheus-nats-exporter + scrape job, or an osb-emitted pending-count
# gauge, then restore this alert alongside the emitter.
groups:
  - name: edge-osb
    interval: 30s
    rules:
      - alert: OSBHighProvisionFailureRate
        expr: |
          (
            sum(rate(osb_nats_messages_total{result="nak"}[5m]))
            /
            sum(rate(osb_nats_messages_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          team: edge
        annotations:
          summary: "OSB worker NAK rate > 5%"
          description: >
            More than 5% of provision requests are failing in the
            worker. Check NATS consumer lag and Postgres connectivity.

      - alert: OSBWebhookDeliveryDegraded
        expr: |
          (
            sum(rate(osb_webhook_deliveries_total{result="failure"}[15m]))
            /
            sum(rate(osb_webhook_deliveries_total[15m]))
          ) > 0.1
        for: 10m
        labels:
          severity: warning
          team: edge
        annotations:
          summary: "OSB webhook delivery failure rate > 10%"
