replicaCount: 2

image:
  repository: ghcr.io/gaboracnicolai/edge-control-plane
  tag: "447ceb18980fc02fdc7e28db16354c62e3018850"  # pin to the SHA you pushed
  pullPolicy: IfNotPresent

# DB migrator (cmd/migrate) — applies the control-plane + OSB schemas to the
# shared database as a pre-install/pre-upgrade hook (templates/migrate-job.yaml).
# Non-Kubernetes equivalent: `DATABASE_URL=... edge-migrate`. See docs/migrations.md.
migrate:
  image:
    repository: ghcr.io/gaboracnicolai/edge-migrate
    tag: "latest"  # pin to the SHA you pushed
    pullPolicy: IfNotPresent
  resources: {}

service:
  type: ClusterIP
  grpcPort: 18000
  metricsPort: 2112

config:
  xdsListenAddr: "0.0.0.0:18000"
  xdsHealthAddr: "0.0.0.0:18001"  # /healthz + /readyz HTTP server (probe target)
  xdsNodeId: "edge-proxy"
  reconcileIntervalMs: 5000

# Gateway HTTP rate limiting (Envoy local_ratelimit, per listener, per Envoy
# instance). Fail-open: a limiter problem never blocks traffic. Defaults are
# generous (100 req/s, burst 200) so only floods are throttled.
rateLimit:
  enabled: true
  maxTokens: 200       # burst size
  tokensPerFill: 100   # tokens refilled each interval
  fillIntervalMs: 1000

# Gateway ext_authz (Envoy → auth-service gRPC). FAIL-CLOSED: if the
# auth-service is unreachable Envoy denies.
#
# BASE DEFAULT STAYS OFF (enabled: false). Do NOT flip this to true here: ArgoCD
# auto-syncs base values (selfHeal, targetRevision: HEAD), so an enabled:true in
# BASE = the prod cutover happens on merge — flipping auth ON before the operator
# has verified the auth front is reachable = gateway deny-all. The cert paths below
# are pre-wired but INERT while disabled (the reconciler only reads them when
# enabled). The flip is a deliberate LAUNCH-DAY step, applied via an env overlay
# (deploy/envs/prod/<region>/values-control-plane.yaml: extAuthz.enabled: true) or
# a manual `helm --set` against a cluster confirmed ready — never a merge-time
# side effect.
extAuthz:
  enabled: false
  address: auth-service.infra.svc.cluster.local
  port: 50051
  # Upstream mTLS cert paths AS MOUNTED ON THE ENVOY (edge-proxy) POD — the proxy
  # reads them, not the control plane; the reconciler only renders these path
  # strings into the ext_authz cluster (and only when enabled). The auth-service
  # requires client-cert verification (AUTH_TLS_CA), so all three MUST be set and
  # MUST match the edge-proxy mount (edge-proxy values extAuthz.clientTLS.mountPath
  # = /etc/authz-client-tls, secret envoy-authz-client-tls-secret). caFile presence
  # is what makes the reconciler render TLS (vs plaintext → deny-all).
  caFile: /etc/authz-client-tls/ca.crt
  certFile: /etc/authz-client-tls/tls.crt
  keyFile: /etc/authz-client-tls/tls.key

# Gateway rate-limit service (Envoy global ratelimit → RLS over gRPC) — the
# cross-instance, identity-keyed shared layer. FAIL-OPEN: if the RLS is
# unreachable Envoy allows and the per-instance local_ratelimit floor still
# applies. Opt-in (default off; needs the auth front so x-user-id flows).
rateLimitService:
  enabled: false
  address: edge-ratelimit.infra.svc.cluster.local
  port: 8082
  domain: edge
  # Upstream (m)TLS cert paths AS MOUNTED ON THE ENVOY (edge-proxy) POD.
  caFile: ""
  certFile: ""
  keyFile: ""

# R4 CO-LOCATION: this DSN and the edge-osb DATABASE_URL must reference the SAME
# Postgres database (both schemas applied there), so the OSB translator can write
# derived data-plane rows in the same transaction as the services row.
# See docs/osb-translator-stage1.md.
postgres:
  existingSecret: edge-control-plane-postgres
  secretKey: dsn

# HA — leave redis.addr empty to run in single-instance mode.
# Set redis.addr to enable shared snapshot hash/version and instance heartbeats
# across all control-plane replicas.
redis:
  addr: ""          # e.g. "redis-master.infra.svc.cluster.local:6379"
  existingSecret: "" # Secret with key "password"; leave empty if no auth
  secretKey: password

tls:
  existingSecret: edge-cp-tls-secret  # created by k8s/certs/control-plane-cert.yaml
  mountPath: /etc/xds-tls

# Pull secret(s) for private images, wired onto the ServiceAccount so pods (and
# hook Jobs) can pull without a manual `kubectl patch sa`. e.g. [{name: ghcr}].
imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

resources:
  requests:
    cpu: 200m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "2112"

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: edge-control-plane
          topologyKey: kubernetes.io/hostname

nameOverride: ""
fullnameOverride: ""
