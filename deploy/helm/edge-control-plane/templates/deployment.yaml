apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edge-control-plane.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-control-plane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "edge-control-plane.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edge-control-plane.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "edge-control-plane.serviceAccountName" . }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: control-plane
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 18000
              protocol: TCP
            - name: metrics
              containerPort: 2112
              protocol: TCP
            - name: health
              containerPort: 18001
              protocol: TCP
          env:
            - name: XDS_LISTEN_ADDR
              value: {{ .Values.config.xdsListenAddr | quote }}
            - name: XDS_HEALTH_ADDR
              value: {{ .Values.config.xdsHealthAddr | quote }}
            - name: XDS_NODE_ID
              value: {{ .Values.config.xdsNodeId | quote }}
            - name: XDS_RECONCILE_INTERVAL_MS
              value: {{ .Values.config.reconcileIntervalMs | quote }}
            - name: GW_RATELIMIT_ENABLED
              value: {{ .Values.rateLimit.enabled | quote }}
            - name: GW_RATELIMIT_MAX_TOKENS
              value: {{ .Values.rateLimit.maxTokens | quote }}
            - name: GW_RATELIMIT_TOKENS_PER_FILL
              value: {{ .Values.rateLimit.tokensPerFill | quote }}
            - name: GW_RATELIMIT_FILL_INTERVAL_MS
              value: {{ .Values.rateLimit.fillIntervalMs | quote }}
            - name: EXT_AUTHZ_ENABLED
              value: {{ .Values.extAuthz.enabled | quote }}
            - name: EXT_AUTHZ_ADDRESS
              value: {{ .Values.extAuthz.address | quote }}
            - name: EXT_AUTHZ_PORT
              value: {{ .Values.extAuthz.port | quote }}
            {{- if .Values.extAuthz.caFile }}
            - name: EXT_AUTHZ_CA_FILE
              value: {{ .Values.extAuthz.caFile | quote }}
            {{- end }}
            {{- if .Values.extAuthz.certFile }}
            - name: EXT_AUTHZ_CERT_FILE
              value: {{ .Values.extAuthz.certFile | quote }}
            {{- end }}
            {{- if .Values.extAuthz.keyFile }}
            - name: EXT_AUTHZ_KEY_FILE
              value: {{ .Values.extAuthz.keyFile | quote }}
            {{- end }}
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecret }}
                  key: {{ .Values.postgres.secretKey }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if .Values.redis.addr }}
            - name: REDIS_ADDR
              value: {{ .Values.redis.addr | quote }}
            {{- end }}
            {{- if .Values.redis.existingSecret }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: {{ .Values.redis.secretKey }}
            {{- end }}
            {{- with .Values.tls }}
            - name: XDS_TLS_CERT
              value: {{ .mountPath }}/tls.crt
            - name: XDS_TLS_KEY
              value: {{ .mountPath }}/tls.key
            - name: XDS_TLS_CA
              value: {{ .mountPath }}/ca.crt
            {{- end }}
          volumeMounts:
            {{- with .Values.tls }}
            - name: xds-tls
              mountPath: {{ .mountPath }}
              readOnly: true
            {{- end }}
          # Readiness gates traffic/rollout on the server having published its
          # first xDS snapshot (/readyz → 503 until then), so a replica that is
          # up but not yet serving config is held out of rotation.
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          # Liveness stays on the gRPC socket: it tracks the critical xDS port
          # directly and must not depend on the secondary health server, so a
          # health-server hiccup never restarts a working xDS process.
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- with .Values.tls }}
        - name: xds-tls
          secret:
            secretName: {{ .existingSecret }}
        {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
