{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "edge-control-plane.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-control-plane.labels" . | nindent 4 }}
  {{- with .Values.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
