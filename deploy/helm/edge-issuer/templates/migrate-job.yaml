apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "edge-issuer.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-issuer.labels" . | nindent 4 }}
  annotations:
    # Run the embedded DB migrations before the Deployment rolls out, on every
    # install and upgrade. Migrations are idempotent (CREATE ... IF NOT EXISTS).
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "edge-issuer.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "edge-issuer.serviceAccountName" . }}
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["migrate"]
          env:
            - name: ISSUER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.existingSecret }}
                  key: ISSUER_DATABASE_URL
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
