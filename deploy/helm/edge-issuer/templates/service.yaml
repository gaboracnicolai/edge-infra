apiVersion: v1
kind: Service
metadata:
  name: {{ include "edge-issuer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-issuer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "edge-issuer.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.service.port }}
      targetPort: https
      protocol: TCP
