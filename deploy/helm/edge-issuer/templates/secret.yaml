{{/*
This chart does NOT create Secrets. Two pre-existing Secrets are required in
the release namespace:

1. config.existingSecret (default: issuer-secrets) with:
     ISSUER_URL          — issuer URL; becomes the JWT `iss` and must equal
                           the auth-service JWT_ISSUER
     ISSUER_AUDIENCE     — JWT `aud`; must equal the auth-service JWT_AUDIENCE
     ISSUER_DATABASE_URL — DSN for the issuer's OWN Postgres database

   kubectl -n infra create secret generic issuer-secrets \
     --from-literal=ISSUER_URL='https://issuer.infra.svc.cluster.local' \
     --from-literal=ISSUER_AUDIENCE='edge.example.com' \
     --from-literal=ISSUER_DATABASE_URL='postgres://issuer:***@issuer-db:5432/issuer?sslmode=require'

2. signingKeys.existingSecret (default: issuer-signing-keys) whose data keys
   are "<kid>.pem" PEM-encoded RSA private keys. Publish current + next to
   rotate without downtime; set config.activeKid to the one to sign with.

   openssl genrsa -out 2026-06.pem 2048
   kubectl -n infra create secret generic issuer-signing-keys \
     --from-file=2026-06.pem

   Rotation: add the next key to this Secret, wait one JWKS refresh interval
   (so the auth-service has fetched it), then flip config.activeKid.

The serving TLS Secret (tls.existingSecret) is created by
k8s/certs/issuer-cert.yaml via cert-manager.
*/}}
