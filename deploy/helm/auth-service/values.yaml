replicaCount: 2

image:
  repository: ghcr.io/gaboracnicolai/auth-service
  tag: "447ceb18980fc02fdc7e28db16354c62e3018850"  # pin to the SHA you pushed
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  grpcPort: 50051
  metricsPort: 9090

config:
  existingSecret: auth-service-secrets

tls:
  existingSecret: auth-service-tls-secret  # created by k8s/certs/auth-service-cert.yaml
  mountPath: /etc/auth-tls

# Pull secret(s) for private images, wired onto the ServiceAccount so pods (and
# hook Jobs) can pull without a manual `kubectl patch sa`. e.g. [{name: ghcr}].
imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

resources:
  requests:
    cpu: 200m
    memory: 64Mi
  limits:
    cpu: 1000m
    memory: 256Mi

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"

nameOverride: ""
fullnameOverride: ""
