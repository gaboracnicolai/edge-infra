replicaCount: 2

image:
  repository: ghcr.io/gaboracnicolai/auth-service
  tag: "e51e304cf2cf4bff91a180a650f029ce80ff2ed1"  # pin to the SHA you pushed
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  grpcPort: 50051
  metricsPort: 9090

config:
  existingSecret: auth-service-secrets

serviceAccount:
  create: true
  name: ""

resources:
  requests:
    cpu: 200m
    memory: 64Mi
  limits:
    cpu: 1000m
    memory: 256Mi

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"

nameOverride: ""
fullnameOverride: ""
