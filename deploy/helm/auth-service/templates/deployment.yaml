apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "auth-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auth-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "auth-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "auth-service.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "auth-service.serviceAccountName" . }}
      containers:
        - name: auth-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
          env:
            - name: GRPC_ADDR
              value: "0.0.0.0:{{ .Values.service.grpcPort }}"
            - name: METRICS_ADDR
              value: "0.0.0.0:{{ .Values.service.metricsPort }}"
            - name: JWKS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.existingSecret }}
                  key: JWKS_URL
            - name: JWT_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.existingSecret }}
                  key: JWT_AUDIENCE
            - name: JWT_ISSUER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.existingSecret }}
                  key: JWT_ISSUER
            - name: GATEWAY_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.existingSecret }}
                  key: GATEWAY_AUTH_SECRET
            {{- with .Values.tls }}
            - name: AUTH_TLS_CERT
              value: {{ .mountPath }}/tls.crt
            - name: AUTH_TLS_KEY
              value: {{ .mountPath }}/tls.key
            - name: AUTH_TLS_CA
              value: {{ .mountPath }}/ca.crt
            # Trust the same internal CA for the https JWKS fetch, so the
            # auth-service can reach the token issuer's JWKS endpoint.
            - name: JWKS_CA_FILE
              value: {{ .mountPath }}/ca.crt
            {{- end }}
          volumeMounts:
            {{- with .Values.tls }}
            - name: auth-tls
              mountPath: {{ .mountPath }}
              readOnly: true
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- with .Values.tls }}
        - name: auth-tls
          secret:
            secretName: {{ .existingSecret }}
        {{- end }}
