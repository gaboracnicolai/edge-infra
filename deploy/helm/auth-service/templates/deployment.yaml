apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "auth-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auth-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "auth-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "auth-service.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "auth-service.serviceAccountName" . }}
      containers:
        - name: auth-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
          env:
            - name: GRPC_ADDR
              value: "0.0.0.0:{{ .Values.service.grpcPort }}"
            - name: METRICS_ADDR
              value: "0.0.0.0:{{ .Values.service.metricsPort }}"
            - name: JWKS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.existingSecret }}
                  key: JWKS_URL
            - name: JWT_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.existingSecret }}
                  key: JWT_AUDIENCE
            - name: JWT_ISSUER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.existingSecret }}
                  key: JWT_ISSUER
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
