{{/*
This chart does NOT create the application Secret. The value
`config.existingSecret` (default: auth-service-secrets) must reference a
pre-existing Secret in the release namespace containing:

  JWKS_URL             — HTTPS endpoint serving the JSON Web Key Set
  JWT_AUDIENCE         — expected aud claim
  JWT_ISSUER           — expected iss claim
  GATEWAY_AUTH_SECRET  — shared transit-proof secret (>=16 chars) injected as
                         the x-gateway-auth header; backends reject requests
                         that lack the matching value. Must match the value
                         configured in each backend (e.g. Track).

Create it once before installing the chart, e.g.:

  kubectl -n infra create secret generic auth-service-secrets \
    --from-literal=JWKS_URL='https://auth.example.com/.well-known/jwks.json' \
    --from-literal=JWT_AUDIENCE='edge.example.com' \
    --from-literal=JWT_ISSUER='https://auth.example.com' \
    --from-literal=GATEWAY_AUTH_SECRET="$(openssl rand -hex 32)"

The Deployment pulls these via env.valueFrom.secretKeyRef.
*/}}
