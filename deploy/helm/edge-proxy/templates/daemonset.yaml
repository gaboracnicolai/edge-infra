apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "edge-proxy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-proxy.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "edge-proxy.selectorLabels" . | nindent 6 }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "edge-proxy.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "edge-proxy.serviceAccountName" . }}
      hostNetwork: {{ .Values.hostNetwork }}
      dnsPolicy: {{ if .Values.hostNetwork }}ClusterFirstWithHostNet{{ else }}ClusterFirst{{ end }}
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: bootstrap
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - >-
              sed "s/NODE_ID_PLACEHOLDER/$NODE_NAME/g"
              /bootstrap-src/bootstrap.yaml
              > /etc/envoy/bootstrap.yaml
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: bootstrap-src
              mountPath: /bootstrap-src
            - name: envoy-config
              mountPath: /etc/envoy
      containers:
        - name: envoy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-c"
            - "/etc/envoy/bootstrap.yaml"
            - "--service-cluster"
            - "edge-proxy"
          ports:
            - name: https
              containerPort: 443
              hostPort: 443
              protocol: TCP
            - name: http
              containerPort: 80
              hostPort: 80
              protocol: TCP
            - name: admin
              containerPort: 9901
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
            - name: tls-certs
              mountPath: /etc/envoy/tls
              readOnly: true
      volumes:
        - name: bootstrap-src
          configMap:
            name: {{ include "edge-proxy.fullname" . }}-bootstrap
        - name: envoy-config
          emptyDir: {}
        - name: tls-certs
          secret:
            secretName: {{ .Values.tls.existingSecret }}
            optional: true
