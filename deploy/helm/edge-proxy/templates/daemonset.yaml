apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "edge-proxy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-proxy.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "edge-proxy.selectorLabels" . | nindent 6 }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "edge-proxy.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "edge-proxy.serviceAccountName" . }}
      hostNetwork: {{ .Values.hostNetwork }}
      dnsPolicy: {{ if .Values.hostNetwork }}ClusterFirstWithHostNet{{ else }}ClusterFirst{{ end }}
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: bootstrap
          image: busybox:1.36@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662  # pinned digest
          command:
            - /bin/sh
            - -c
            - >-
              sed "s/NODE_ID_PLACEHOLDER/$NODE_NAME/g"
              /bootstrap-src/bootstrap.yaml
              > /etc/envoy/bootstrap.yaml
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: bootstrap-src
              mountPath: /bootstrap-src
            - name: envoy-config
              mountPath: /etc/envoy
      containers:
        - name: envoy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-c"
            - "/etc/envoy/bootstrap.yaml"
            - "--service-cluster"
            - "edge-proxy"
          ports:
            - name: https
              containerPort: 443
              hostPort: 443
              protocol: TCP
            - name: http
              containerPort: 80
              hostPort: 80
              protocol: TCP
            # Admin is bound to 127.0.0.1 in the bootstrap (R7) — in-pod only, not
            # a probe/scrape target.
            - name: admin
              containerPort: 9901
              protocol: TCP
            # Dedicated readiness endpoint (static bootstrap listener). The kubelet
            # probes hit this on the pod IP, so the admin can stay localhost-only.
            - name: health
              containerPort: 9902
              protocol: TCP
            # Prometheus metrics (proxies /stats/prometheus from the localhost
            # admin); scraped via the pod IP, admin stays localhost-only.
            - name: stats
              containerPort: 9903
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
            - name: tls-certs
              mountPath: /etc/envoy/tls
              readOnly: true
            {{- if .Values.xds.tls.enabled }}
            - name: xds-client-tls
              mountPath: {{ .Values.xds.tls.mountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.extAuthz.clientTLS.enabled }}
            - name: authz-client-tls
              mountPath: {{ .Values.extAuthz.clientTLS.mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        - name: bootstrap-src
          configMap:
            name: {{ include "edge-proxy.fullname" . }}-bootstrap
        - name: envoy-config
          emptyDir: {}
        - name: tls-certs
          secret:
            secretName: {{ .Values.tls.existingSecret }}
            optional: true
        {{- if .Values.xds.tls.enabled }}
        - name: xds-client-tls
          secret:
            secretName: {{ .Values.xds.tls.existingSecret }}
        {{- end }}
        {{- if .Values.extAuthz.clientTLS.enabled }}
        - name: authz-client-tls
          secret:
            secretName: {{ .Values.extAuthz.clientTLS.existingSecret }}
        {{- end }}
