apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "edge-proxy.fullname" . }}-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-proxy.labels" . | nindent 4 }}
data:
  bootstrap.yaml: |
    node:
      id: NODE_ID_PLACEHOLDER
      cluster: edge-proxy
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901
    dynamic_resources:
      ads_config:
        api_type: GRPC
        transport_api_version: V3
        grpc_services:
          - envoy_grpc:
              cluster_name: xds_cluster
      cds_config:
        ads: {}
        resource_api_version: V3
      lds_config:
        ads: {}
        resource_api_version: V3
    static_resources:
      clusters:
        - name: xds_cluster
          connect_timeout: 5s
          type: STRICT_DNS
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: xds_cluster
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.xds.controlPlaneHost }}
                          port_value: {{ .Values.xds.controlPlanePort }}
          {{- if .Values.xds.tls.enabled }}
          # xDS transport mTLS to the control plane. The client cert (mounted
          # from envoy-xds-client-tls-secret at xds.tls.mountPath) satisfies the
          # server's RequireAndVerifyClientCert; the server is verified by CA +
          # SAN. SAN is pinned to controlPlaneHost — the control-plane server
          # cert SAN (k8s/certs/control-plane-cert.yaml dnsNames) MUST equal this
          # host, or the handshake fails.
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              sni: {{ .Values.xds.controlPlaneHost }}
              common_tls_context:
                tls_certificates:
                  - certificate_chain:
                      filename: {{ .Values.xds.tls.mountPath }}/tls.crt
                    private_key:
                      filename: {{ .Values.xds.tls.mountPath }}/tls.key
                validation_context:
                  trusted_ca:
                    filename: {{ .Values.xds.tls.mountPath }}/ca.crt
                  match_typed_subject_alt_names:
                    - san_type: DNS
                      matcher:
                        exact: {{ .Values.xds.controlPlaneHost }}
          {{- end }}
