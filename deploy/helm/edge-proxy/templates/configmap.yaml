apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "edge-proxy.fullname" . }}-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-proxy.labels" . | nindent 4 }}
data:
  bootstrap.yaml: |
    node:
      id: NODE_ID_PLACEHOLDER
      cluster: edge-proxy
    admin:
      # Bound to localhost ONLY (R7): the admin interface (/config_dump,
      # /quitquitquit, …) must never be reachable from off-pod. Readiness is
      # served by the dedicated static health listener below, not the admin.
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901
    dynamic_resources:
      ads_config:
        api_type: GRPC
        transport_api_version: V3
        grpc_services:
          - envoy_grpc:
              cluster_name: xds_cluster
      cds_config:
        ads: {}
        resource_api_version: V3
      lds_config:
        ads: {}
        resource_api_version: V3
    static_resources:
      listeners:
        # Dedicated readiness listener (R7). STATIC in the bootstrap, so it answers
        # even before/without any xDS config — the kubelet readiness probe targets
        # this (port 9902 /ready), never the localhost-only admin. The health_check
        # filter returns 200 while serving and 503 during drain/shutdown.
        - name: health
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 9902
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: health
                    route_config:
                      name: health
                      virtual_hosts:
                        - name: health
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              direct_response:
                                status: 404
                    http_filters:
                      - name: envoy.filters.http.health_check
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.health_check.v3.HealthCheck
                          pass_through_mode: false
                          headers:
                            - name: ":path"
                              string_match:
                                exact: "/ready"
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
        # Prometheus metrics listener (R7 follow-up). STATIC, so it serves even
        # with an empty xDS config. It proxies ONLY /stats/prometheus to the
        # localhost admin (admin_stats cluster) and 404s everything else — so
        # metrics are scrape-reachable off-pod while the admin mutation endpoints
        # (/quitquitquit, /config_dump, …) stay unreachable via this port.
        - name: stats
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 9903
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: stats
                    route_config:
                      name: stats
                      virtual_hosts:
                        - name: stats
                          domains: ["*"]
                          routes:
                            - match:
                                path: "/stats/prometheus"
                              route:
                                cluster: admin_stats
                            - match:
                                prefix: "/"
                              direct_response:
                                status: 404
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: xds_cluster
          connect_timeout: 5s
          type: STRICT_DNS
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: xds_cluster
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.xds.controlPlaneHost }}
                          port_value: {{ .Values.xds.controlPlanePort }}
          {{- if .Values.xds.tls.enabled }}
          # xDS transport mTLS to the control plane. The client cert (mounted
          # from envoy-xds-client-tls-secret at xds.tls.mountPath) satisfies the
          # server's RequireAndVerifyClientCert; the server is verified by CA +
          # SAN. SAN is pinned to controlPlaneHost — the control-plane server
          # cert SAN (k8s/certs/control-plane-cert.yaml dnsNames) MUST equal this
          # host, or the handshake fails.
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              sni: {{ .Values.xds.controlPlaneHost }}
              common_tls_context:
                # The control-plane xDS server requires TLS 1.3 (cmd/server/tls.go
                # MinVersion). Without pinning the max here, Envoy's BoringSSL
                # upstream default caps at TLS 1.2 and the handshake fails with a
                # protocol_version alert — the proxy then never receives any config.
                tls_params:
                  tls_minimum_protocol_version: TLSv1_2
                  tls_maximum_protocol_version: TLSv1_3
                tls_certificates:
                  - certificate_chain:
                      filename: {{ .Values.xds.tls.mountPath }}/tls.crt
                    private_key:
                      filename: {{ .Values.xds.tls.mountPath }}/tls.key
                validation_context:
                  trusted_ca:
                    filename: {{ .Values.xds.tls.mountPath }}/ca.crt
                  match_typed_subject_alt_names:
                    - san_type: DNS
                      matcher:
                        exact: {{ .Values.xds.controlPlaneHost }}
          {{- end }}
        # Localhost-only admin, reached solely by the stats listener above to
        # proxy /stats/prometheus. Never exposed directly.
        - name: admin_stats
          connect_timeout: 1s
          type: STATIC
          load_assignment:
            cluster_name: admin_stats
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: 9901
