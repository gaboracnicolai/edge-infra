apiVersion: v1
kind: Service
metadata:
  name: {{ include "edge-proxy.fullname" . }}-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-proxy.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "edge-proxy.selectorLabels" . | nindent 4 }}
  ports:
    - name: admin
      port: 9901
      targetPort: 9901
      protocol: TCP
