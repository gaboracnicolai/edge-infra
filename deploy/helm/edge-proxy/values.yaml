image:
  repository: envoyproxy/envoy
  tag: v1.30.0@sha256:d7d501253a93f0b5fce8e0d3a24f3bef67372c50ed7ea922279c72fc1200be58  # pinned digest
  pullPolicy: IfNotPresent

hostNetwork: true

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: "10%"

xds:
  controlPlaneHost: edge-control-plane.infra.svc.cluster.local
  controlPlanePort: 18000
  tls:
    # mTLS to the control-plane xDS server, which requires client certs
    # unconditionally. Gates BOTH the bootstrap transport_socket and the client
    # cert mount together (no plaintext half-state). Keep true fleet-wide.
    enabled: true
    existingSecret: envoy-xds-client-tls-secret
    mountPath: /etc/xds-client-tls

tls:
  existingSecret: envoy-serving-tls-secret

# ext_authz upstream client cert (edge-proxy → auth-service mTLS). The auth-service
# requires client-cert verification, so Envoy must present this cert on the
# ext_authz gRPC leg. This only MOUNTS the secret on the Envoy pod; the control
# plane renders the ext_authz cluster and points at these files via its own
# extAuthz.caFile/certFile/keyFile — whose directory MUST equal mountPath here.
# Deploy order at cutover: apply k8s/certs/envoy-authz-client-cert.yaml FIRST (the
# secret is cert-manager-issued, NOT ArgoCD-managed), then enable this + the
# control-plane extAuthz together. The volume is required (not optional): if the
# secret is absent the pod won't start — a loud, correct failure vs. silent
# plaintext. Keep in lockstep with edge-control-plane extAuthz.enabled.
extAuthz:
  clientTLS:
    enabled: true
    existingSecret: envoy-authz-client-tls-secret
    mountPath: /etc/authz-client-tls

# Pull secret(s) for private images, wired onto the ServiceAccount so pods (and
# hook Jobs) can pull without a manual `kubectl patch sa`. e.g. [{name: ghcr}].
imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

resources:
  requests:
    cpu: 500m
    memory: 256Mi
  limits:
    cpu: 2000m
    memory: 1Gi

podAnnotations:
  prometheus.io/scrape: "true"
  # Scrape the dedicated stats listener (proxies /stats/prometheus from the
  # localhost-only admin), NOT the admin port (9901, now 127.0.0.1-only).
  prometheus.io/port: "9903"
  prometheus.io/path: "/stats/prometheus"

nameOverride: ""
fullnameOverride: ""
