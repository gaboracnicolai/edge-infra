image:
  repository: envoyproxy/envoy
  tag: v1.30.0@sha256:d7d501253a93f0b5fce8e0d3a24f3bef67372c50ed7ea922279c72fc1200be58  # pinned digest
  pullPolicy: IfNotPresent

hostNetwork: true

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: "10%"

xds:
  controlPlaneHost: edge-control-plane.infra.svc.cluster.local
  controlPlanePort: 18000
  tls:
    # mTLS to the control-plane xDS server, which requires client certs
    # unconditionally. Gates BOTH the bootstrap transport_socket and the client
    # cert mount together (no plaintext half-state). Keep true fleet-wide.
    enabled: true
    existingSecret: envoy-xds-client-tls-secret
    mountPath: /etc/xds-client-tls

tls:
  existingSecret: envoy-serving-tls-secret

serviceAccount:
  create: true
  name: ""

resources:
  requests:
    cpu: 500m
    memory: 256Mi
  limits:
    cpu: 2000m
    memory: 1Gi

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9901"

nameOverride: ""
fullnameOverride: ""
