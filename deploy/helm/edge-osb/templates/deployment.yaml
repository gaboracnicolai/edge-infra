apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edge-osb.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-osb.labels" . | nindent 4 }}
    component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "edge-osb.apiSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edge-osb.apiSelectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "edge-osb.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - uvicorn
            - main:app
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--workers"
            - "2"
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ .Values.config.existingSecret }}
          {{- with .Values.tls }}
          env:
            - name: DB_SSL_MODE
              value: {{ .dbSslMode | default "verify-full" | quote }}
            - name: DB_TLS_CA
              value: {{ .mountPath }}/ca.crt
            - name: NATS_TLS_CA
              value: {{ .mountPath }}/ca.crt
            - name: NATS_TLS_CERT
              value: {{ .mountPath }}/tls.crt
            - name: NATS_TLS_KEY
              value: {{ .mountPath }}/tls.key
          {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          {{- with .Values.tls }}
          volumeMounts:
            - name: osb-tls
              mountPath: {{ .mountPath }}
              readOnly: true
          {{- end }}
      {{- with .Values.tls }}
      volumes:
        - name: osb-tls
          secret:
            secretName: {{ .existingSecret }}
      {{- end }}
