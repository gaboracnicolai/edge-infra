apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edge-osb.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-osb.labels" . | nindent 4 }}
    component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "edge-osb.apiSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edge-osb.apiSelectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "edge-osb.serviceAccountName" . }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - uvicorn
            - main:app
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--workers"
            - "2"
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ .Values.config.existingSecret }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
