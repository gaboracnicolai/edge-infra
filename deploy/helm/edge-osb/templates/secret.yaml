{{/*
This chart does NOT create the application Secret. The values
`config.existingSecret` (default: edge-osb-secrets) must reference a
pre-existing Secret in the release namespace containing:

  DATABASE_URL — Postgres DSN consumed by both API and worker
  NATS_URL     — NATS connection string for JetStream

Create it once before installing the chart, e.g.:

  kubectl -n infra create secret generic edge-osb-secrets \
    --from-literal=DATABASE_URL='postgresql://broker@pg:5432/edge_osb' \
    --from-literal=NATS_URL='nats://nats:4222'

The Deployments pull these values via env.valueFrom.secretKeyRef.
*/}}
