api:
  replicaCount: 2
  image:
    repository: ghcr.io/gaboracnicolai/edge-osb
    tag: "447ceb18980fc02fdc7e28db16354c62e3018850"  # pin to the SHA you pushed
    pullPolicy: IfNotPresent
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

worker:
  replicaCount: 2
  image:
    repository: ghcr.io/gaboracnicolai/edge-osb
    tag: "447ceb18980fc02fdc7e28db16354c62e3018850"  # pin to the SHA you pushed
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

config:
  # All process config (DATABASE_URL, NATS_URL, …) is pulled from this secret
  # via envFrom. Two independent access-control keys (ISO 27001 A.9) can be added
  # to this secret; both default to unset (open) for local dev:
  #   - API_KEY        gates the provisioning API (POST/DELETE /v1/services,
  #                    GET /v1/requests). Callers must send
  #                    `Authorization: Bearer <key>` → 401 if missing, 403 if wrong.
  #                    NOTE: shared-key scheme is provisional, pending Nicolai's
  #                    sign-off on the real caller credential (key vs. mTLS).
  #   - ADMIN_API_KEY  gates /metrics. Callers (incl. Prometheus) must send a
  #                    matching X-Admin-Key header. Enabling it requires the
  #                    scrape job to inject the header (see podAnnotations below).
  existingSecret: edge-osb-secrets

# Transport security (ISO 27001 A.13). When `tls` is set, the OSB mounts its
# cert-manager-issued secret and is told to use verify-full Postgres TLS and
# mutual NATS TLS. Leave unset for local/plaintext dev.
tls:
  existingSecret: osb-client-tls-secret  # created by k8s/certs/osb-client-cert.yaml
  mountPath: /etc/osb-tls
  dbSslMode: verify-full

# Pull secret(s) for private images, wired onto the ServiceAccount so pods (and
# hook Jobs) can pull without a manual `kubectl patch sa`. e.g. [{name: ghcr}].
imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

# Annotation-based scraping cannot attach the X-Admin-Key header. If you set
# ADMIN_API_KEY in the config secret, switch to a Prometheus ServiceMonitor
# whose endpoint carries `headers: {X-Admin-Key: <key from secret>}`, otherwise
# the scrape will get 401. /healthz stays open for kubelet probes either way.
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"

nameOverride: ""
fullnameOverride: ""
