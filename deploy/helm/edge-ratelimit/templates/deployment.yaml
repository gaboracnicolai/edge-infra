apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edge-ratelimit.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "edge-ratelimit.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "edge-ratelimit.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edge-ratelimit.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "edge-ratelimit.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        # Numeric UID/GID is REQUIRED: the distroless image's user is the NAME
        # "nonroot", which the kubelet cannot verify as non-root at admission —
        # runAsNonRoot alone then yields CreateContainerConfigError and the pod
        # never starts. 65532 is the distroless nonroot uid:gid.
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ratelimit
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          env:
            - name: RL_LISTEN_ADDR
              value: "0.0.0.0:{{ .Values.service.grpcPort }}"
            - name: RL_HEALTH_ADDR
              value: "0.0.0.0:{{ .Values.service.healthPort }}"
            - name: RL_RPM
              value: {{ .Values.config.rpm | quote }}
            - name: RL_BURST
              value: {{ .Values.config.burst | quote }}
            {{- if .Values.redis.addr }}
            - name: REDIS_ADDR
              value: {{ .Values.redis.addr | quote }}
            {{- end }}
            {{- if .Values.redis.existingSecret }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: {{ .Values.redis.secretKey }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
