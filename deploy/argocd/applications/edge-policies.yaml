apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edge-policies
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: edge-infra
  source:
    repoURL: https://github.com/gaboracnicolai/edge-infra
    targetRevision: HEAD
    path: k8s/policies
    directory:
      recurse: false
      # Sync only the cluster admission policy. The CLI test fixtures (tests/)
      # and the per-namespace NetworkPolicy template (which has placeholders
      # that aren't valid to apply directly) are excluded.
      exclude: backend-network-policies.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2
  revisionHistoryLimit: 10
