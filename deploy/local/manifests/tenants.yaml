# Two tenant backends (Phase 8). Each namespace runs a trivial http-echo that
# returns a distinct fingerprint, so the routed-request proof can tell which
# tenant's backend answered. The gateway route matches on Host header
# (tenant-a.local / tenant-b.local) and forwards to that tenant's echo Service.
#
# NB: image hashicorp/http-echo:0.2.3 is kept in sync with ECHO_IMAGE in lib.sh.
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-a
  labels: { part-of: edge-local, tenant: tenant-a }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: echo, namespace: tenant-a, labels: { app: echo, part-of: edge-local } }
spec:
  replicas: 1
  selector: { matchLabels: { app: echo } }
  template:
    metadata: { labels: { app: echo, part-of: edge-local } }
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:0.2.3
          args: ["-text=TENANT-A-BACKEND", "-listen=:5678"]
          ports: [{ name: http, containerPort: 5678 }]
          readinessProbe: { httpGet: { path: /, port: http }, initialDelaySeconds: 2, periodSeconds: 3 }
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 100m, memory: 64Mi }
---
apiVersion: v1
kind: Service
metadata: { name: echo, namespace: tenant-a, labels: { app: echo, part-of: edge-local } }
spec:
  selector: { app: echo }
  ports: [{ name: http, port: 5678, targetPort: 5678 }]
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-b
  labels: { part-of: edge-local, tenant: tenant-b }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: echo, namespace: tenant-b, labels: { app: echo, part-of: edge-local } }
spec:
  replicas: 1
  selector: { matchLabels: { app: echo } }
  template:
    metadata: { labels: { app: echo, part-of: edge-local } }
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:0.2.3
          args: ["-text=TENANT-B-BACKEND", "-listen=:5678"]
          ports: [{ name: http, containerPort: 5678 }]
          readinessProbe: { httpGet: { path: /, port: http }, initialDelaySeconds: 2, periodSeconds: 3 }
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 100m, memory: 64Mi }
---
apiVersion: v1
kind: Service
metadata: { name: echo, namespace: tenant-b, labels: { app: echo, part-of: edge-local } }
spec:
  selector: { app: echo }
  ports: [{ name: http, port: 5678, targetPort: 5678 }]
