apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gateways.edge.io
spec:
  group: edge.io
  scope: Namespaced
  names:
    kind: Gateway
    listKind: GatewayList
    plural: gateways
    singular: gateway
    shortNames:
      - gw
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Protocol
          type: string
          jsonPath: .spec.protocol
        - name: Port
          type: integer
          jsonPath: .spec.port
        - name: Synced
          type: boolean
          jsonPath: .status.synced
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [name, protocol, port, upstreamClusterName]
              properties:
                name:
                  type: string
                  minLength: 1
                protocol:
                  type: string
                  enum: [HTTP, HTTPS]
                port:
                  type: integer
                  minimum: 1
                  maximum: 65535
                tlsSecretName:
                  type: string
                nodeSelector:
                  type: object
                  additionalProperties:
                    type: string
                upstreamClusterName:
                  type: string
                  minLength: 1
            status:
              type: object
              properties:
                synced:
                  type: boolean
                lastSyncedAt:
                  type: string
                  format: date-time
                connectedProxies:
                  type: integer
                  minimum: 0
