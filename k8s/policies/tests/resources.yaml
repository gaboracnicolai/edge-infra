# Fixtures for the Kyverno CLI test: a normal backend namespace (no public
# opt-out label) with one ClusterIP Service (allowed) and a LoadBalancer +
# NodePort Service (must be denied).
apiVersion: v1
kind: Namespace
metadata:
  name: backend
---
apiVersion: v1
kind: Service
metadata:
  name: clusterip-backend
  namespace: backend
spec:
  type: ClusterIP
  selector:
    app: track
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: lb-backend
  namespace: backend
spec:
  type: LoadBalancer
  selector:
    app: track
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: nodeport-backend
  namespace: backend
spec:
  type: NodePort
  selector:
    app: track
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
---
# SEC-3 NetworkPolicy fixtures for disallow-open-intra-namespace-ingress.
# Scoped: intra-namespace ingress restricted to a specific workload + port → allowed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-gateway-scoped
  namespace: backend
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector:
            matchLabels:
              app: track
      ports:
        - protocol: TCP
          port: 5432
---
# Open: a bare podSelector {} intra-namespace ingress = the SEC-3 hole → denied.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-gateway-open
  namespace: backend
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector: {}
---
# Adversarial: default-deny uses spec.podSelector {} as a SELECTOR (all pods this
# policy applies to) with NO ingress rules — must NOT be flagged (it's not a
# from-peer). Proves the guardrail targets ingress from-peers, not the selector.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: backend
spec:
  podSelector: {}
  policyTypes:
    - Ingress
