apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: disallow-public-backend-services
policies:
  - ../disallow-public-backend-services.yaml
  - ../disallow-open-intra-namespace-ingress.yaml
resources:
  - resources.yaml
results:
  # A ClusterIP backend is allowed.
  - policy: disallow-public-backend-services
    rule: no-loadbalancer-nodeport
    kind: Service
    result: pass
    resources:
      - backend/clusterip-backend
  # LoadBalancer and NodePort backends must be blocked.
  - policy: disallow-public-backend-services
    rule: no-loadbalancer-nodeport
    kind: Service
    result: fail
    resources:
      - backend/lb-backend
      - backend/nodeport-backend
  # SEC-3: scoped intra-namespace ingress + the default-deny selector pass;
  # the all-pods (podSelector {}) intra-namespace rule is denied.
  - policy: disallow-open-intra-namespace-ingress
    rule: no-all-pods-ingress
    kind: NetworkPolicy
    result: pass
    resources:
      - backend/allow-from-gateway-scoped
      - backend/default-deny
  - policy: disallow-open-intra-namespace-ingress
    rule: no-all-pods-ingress
    kind: NetworkPolicy
    result: fail
    resources:
      - backend/allow-from-gateway-open
