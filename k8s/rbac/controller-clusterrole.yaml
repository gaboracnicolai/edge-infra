apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: edge-controller
rules:
  - apiGroups: [edge.io]
    resources: [gateways, routerules, gateways/status, routerules/status]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
