apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: issuer-cert
  namespace: infra
spec:
  secretName: issuer-tls-secret
  duration: 2160h   # 90 days
  renewBefore: 360h # 15 days
  commonName: edge-issuer
  dnsNames:
    - edge-issuer
    - edge-issuer.infra.svc.cluster.local
  issuerRef:
    name: edge-internal-ca
    kind: ClusterIssuer
  usages:
    - server auth
    - digital signature
    - key encipherment
