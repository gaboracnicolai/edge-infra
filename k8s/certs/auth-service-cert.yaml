apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: auth-service-cert
  namespace: infra
spec:
  secretName: auth-service-tls-secret
  duration: 2160h   # 90 days
  renewBefore: 360h # 15 days
  commonName: auth-service
  dnsNames:
    - auth-service
    - auth-service.infra.svc.cluster.local
  issuerRef:
    name: edge-internal-ca
    kind: ClusterIssuer
  usages:
    - server auth
    - client auth
    - digital signature
    - key encipherment
