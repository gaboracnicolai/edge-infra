apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: envoy-xds-client-cert
  namespace: edge
spec:
  secretName: envoy-xds-client-tls-secret
  duration: 2160h   # 90 days
  renewBefore: 360h # 15 days
  commonName: envoy-xds-client
  dnsNames:
    - envoy-xds-client
  issuerRef:
    name: edge-internal-ca
    kind: ClusterIssuer
  usages:
    - client auth
    - digital signature
    - key encipherment
